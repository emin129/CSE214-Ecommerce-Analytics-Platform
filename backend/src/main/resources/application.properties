# --- Veritabanı Bağlantısı (Güncellendi) ---
# Veritabanı ismini Python'dakiyle aynı yaptık: ecommerceDB
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerceDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=10892658920
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hibernate ve SQL Ayarları ---
# ddl-auto=none kalsın, çünkü tabloları Python/SQL ile elle oluşturduk, Hibernate bozmasın.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Swagger / API Dokümantasyonu ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- CORS Ayarları (Angular İçin) ---
spring.mvc.cors.allowed-origins=http://localhost:4200
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# --- Log ve Jackson Ayarları ---
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG


