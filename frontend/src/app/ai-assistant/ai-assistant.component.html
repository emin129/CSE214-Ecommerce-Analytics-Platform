<div class="ai-wrapper">

  <div class="ai-header">
    <div class="left">
      <div class="avatar">🤖</div>
      <div>
        <div class="title">AI Assistant</div>
        <div class="status" style="color: #10b981; font-size: 0.8rem;">Online</div>
      </div>
    </div>
  </div>

  <div class="ai-chat" #chatContainer>

    <div class="chat-inner">

      <div class="msg bot">
        <div class="bubble">
          Hello! I am your AI assistant. Ask me anything.
        </div>
      </div>

      <div *ngFor="let msg of messages"
           class="msg"
           [ngClass]="msg.isUser ? 'user' : 'bot'">

        <div class="bubble">
          <div class="d-flex flex-column gap-2">

            <div style="white-space: pre-line;">{{ msg.text }}</div>

            <div *ngIf="!msg.isUser && msg.hasChart" class="mt-3 p-2 bg-black bg-opacity-25 rounded-3" style="width: 100%; min-width: 280px;">
              <h6 style="color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-bottom: 8px;">
                <i class="bi bi-graph-up me-1"></i> Data Visualization
              </h6>
              <div style="position: relative; height: 200px; width:100%;">
                <canvas #aiChart></canvas>
              </div>
            </div>

            <div *ngIf="!msg.isUser && msg.logs" class="mt-2 p-2 bg-black bg-opacity-50 rounded-3 border border-white border-opacity-10">
              <div style="color: #34d399; font-size: 0.75rem; font-family: monospace;">
                <code>> [Gemini Text2SQL Agent] Final response generated.</code>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div *ngIf="isLoading" class="msg bot">
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>

    </div>
  </div>

  <div class="ai-input">
    <div class="input-box">
      <input
        [(ngModel)]="userQuery"
        placeholder="Message AI..."
        (keyup.enter)="askAI()"
        [disabled]="isLoading"
      />

      <button (click)="askAI()" [disabled]="isLoading || !userQuery.trim()">
        ➤
      </button>
    </div>
  </div>

</div>
