<div class="analytics-sector p-4" id="reportArea">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h2 class="dashboard-title">Analytics Dashboard 📊</h2>
    </div>
    <button class="btn-export" (click)="exportReport()">
      <i class="bi bi-cloud-download me-2"></i> Export Report
    </button>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-md-3" *ngFor="let stat of displayStats">
      <div class="cyber-stat-box">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="icon-shell" [ngClass]="stat.color">
            <i class="bi" [class]="stat.icon"></i>
          </div>
          <span class="trend-badge">{{ stat.trend }}</span>
        </div>
        <h3 class="stat-value">{{ stat.value }}</h3>
        <p class="stat-label">{{ stat.label }}</p>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="graph-card p-4">
        <h6 class="card-title">Sales Trends</h6>
        <apx-chart
          *ngIf="!isLoading"
          [series]="areaChartOptions.series"
          [chart]="areaChartOptions.chart"
          [xaxis]="areaChartOptions.xaxis"
          [colors]="areaChartOptions.colors"
          [stroke]="areaChartOptions.stroke"
          [fill]="areaChartOptions.fill"
          [grid]="areaChartOptions.grid">
        </apx-chart>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="graph-card p-4">
        <h6 class="card-title">Categories</h6>
        <apx-chart
          *ngIf="!isLoading"
          [series]="donutChartOptions.series"
          [chart]="donutChartOptions.chart"
          [labels]="donutChartOptions.labels"
          [colors]="donutChartOptions.colors"
          [plotOptions]="donutChartOptions.plotOptions"
          [legend]="donutChartOptions.legend">
        </apx-chart>
      </div>
    </div>
  </div>
</div>
