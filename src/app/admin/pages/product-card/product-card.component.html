<div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden product-card">
  <div class="img-wrapper position-relative">
    <img [src]="product.imageUrl || 'https://placehold.co/300x200?text=No+Image'"
         (error)="setDefaultImage($event)"
         class="card-img-top"
         alt="{{ product.name }}" />
    <span class="badge bg-dark position-absolute top-0 end-0 m-3 shadow-sm">
      STOCK: {{ product.stock }}
    </span>
  </div>

  <div class="card-body d-flex flex-column p-4">
    <h5 class="card-title fw-bold text-dark mb-2">{{ product.name }}</h5>

    <p class="card-text text-muted small flex-grow-1">
      {{ product.description ? product.description : 'No description provided.' }}
    </p>

    <hr class="text-muted opacity-25 my-3">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted small">PRICE:</span>
      <span class="fs-5 fw-bold text-success">
        {{ product.price | currency:'TRY':'symbol':'1.2-2' }}
      </span>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-warning btn-sm flex-fill fw-semibold py-2 rounded-3" (click)="onEdit()">
        ✏️ EDIT
      </button>
      <button class="btn btn-danger btn-sm flex-fill fw-semibold py-2 rounded-3" (click)="onDelete()">
        🗑️ DELETE
      </button>
    </div>
  </div>
</div>
