<div class="seller-container">
  <div class="header-section">
    <h2><i class="fas fa-shopping-basket"></i> My Sales Orders</h2>
    <p>Manage your orders and update shipping status.</p>
  </div>

  <div class="glass-table-container">
    <table class="premium-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer Info</th>
          <th>Total Price</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>#{{ order.id }}</td>
          <td>
            <div class="customer-info">
              <span class="name"><strong>{{ order.user?.username || 'Guest User' }}</strong></span>
              <br>
              <small class="city">{{ order.user?.email }}</small>
            </div>
          </td>
          <td class="price-cell">{{ order.totalPrice | currency:'USD' }}</td>
          <td>
            <select class="status-select" [value]="order.status" (change)="onStatusChange($event, order.id)">
              <option value="PROCESSING">Pending</option>
              <option value="SHIPPED">Shipped</option>
              <option value="DELIVERED">Delivered</option>
              <option value="CANCELED">Canceled</option>
            </select>
          </td>
          <td>
            <button class="btn-cancel-small" (click)="cancelOrder(order.id)">
              <i class="fas fa-times"></i> Cancel
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="orders.length === 0 && !isLoading" class="empty-state">
      <i class="fas fa-box-open"></i>
      <p>No orders found yet.</p>
    </div>
  </div>
</div>
