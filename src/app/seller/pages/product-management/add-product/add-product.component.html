<div class="admin-container">
  <div class="glass-form-card">
    <div class="form-header">
      <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
      <p>Fill in the details to list a new product in the Kaggle Dataset.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group mb-4">
        <label><i class="fas fa-tag"></i> Product Name</label>
        <input type="text" class="custom-input" formControlName="name" placeholder="e.g. Premium Wireless Headphones" />
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label><i class="fas fa-dollar-sign"></i> Price ($)</label>
          <input type="number" class="custom-input" formControlName="price" placeholder="0.00" />
        </div>
        <div class="col-md-6 mb-4">
          <label><i class="fas fa-boxes"></i> Stock Quantity</label>
          <input type="number" class="custom-input" formControlName="stock" placeholder="100" />
        </div>
      </div>

      <div class="form-group mb-4">
        <label><i class="fas fa-align-left"></i> Description</label>
        <textarea class="custom-input" formControlName="description" rows="3" placeholder="Explain the features..."></textarea>
      </div>

      <div class="form-group mb-4">
        <label><i class="fas fa-image"></i> Image URL</label>
        <input type="text" class="custom-input" formControlName="imageUrl" placeholder="https://image-link.com/photo.jpg" />
      </div>

      <div class="form-group mb-5">
        <label><i class="fas fa-layer-group"></i> Category</label>
        <select class="custom-input custom-select" formControlName="category">
          <option [ngValue]="null" disabled selected>-- Select Category from DB --</option>
          <option *ngFor="let cat of categoryOptions" [ngValue]="cat">
            {{ cat.name }}
          </option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="form.reset()">Reset</button>
        <button type="submit" class="btn-submit" [disabled]="form.invalid">
          <span>Create Product</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </form>
  </div>
</div>
