<div class="admin-container">
  <div class="glass-form-card">
    <div class="form-header">
      <h2><i class="fas fa-edit"></i> Edit Product</h2>
      <p>Updating Product ID: #{{productId}}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group mb-4">
        <label><i class="fas fa-tag"></i> Product Name</label>
        <input type="text" class="custom-input" formControlName="name" />
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label><i class="fas fa-dollar-sign"></i> Price ($)</label>
          <input type="number" class="custom-input" formControlName="price" />
        </div>
        <div class="col-md-6 mb-4">
          <label><i class="fas fa-boxes"></i> Stock</label>
          <input type="number" class="custom-input" formControlName="stock" />
        </div>
      </div>

      <div class="form-group mb-4">
        <label><i class="fas fa-align-left"></i> Description</label>
        <textarea class="custom-input" formControlName="description" rows="3"></textarea>
      </div>

      <div class="form-group mb-4">
        <label><i class="fas fa-image"></i> Image URL</label>
        <input type="text" class="custom-input" formControlName="imageUrl" />
      </div>

      <div class="form-group mb-5">
        <label><i class="fas fa-layer-group"></i> Category</label>
        <select class="custom-input custom-select" formControlName="category">
          <option [ngValue]="null" disabled>Select Category</option>
          <option *ngFor="let cat of categoryOptions" [ngValue]="cat">
            {{ cat.name }}
          </option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="router.navigate(['/seller'])">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="form.invalid">
          <span>Update Changes</span>
          <i class="fas fa-save"></i>
        </button>
      </div>
    </form>
  </div>
</div>
