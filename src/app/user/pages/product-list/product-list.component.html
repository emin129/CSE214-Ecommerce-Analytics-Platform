<div class="store-container">
  <div class="store-wrapper">
    <aside class="sidebar glass-panel">
      <div class="user-actions">
        <button class="action-btn" (click)="goToOrders()">
          <i class="fas fa-history"></i><span>Orders</span>
        </button>
        <button class="action-btn cart-accent" (click)="goToCart()">
          <i class="fas fa-shopping-basket"></i><span>Cart</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="ai-section">
        <h3 class="section-title">AI ASSISTANT</h3>
        <button class="ai-btn pulse-animation" (click)="openAiChat()">
          <i class="fas fa-robot"></i>
          <span>Ask AI Agents</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="seller-menu-section">
        <h3 class="section-title">MERCHANT</h3>
        <button class="action-btn seller-accent" (click)="goToBecomeSeller()">
          <i class="fas fa-store"></i><span>Become a Seller</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="category-menu">
        <button class="category-toggle" (click)="isMenuOpen = !isMenuOpen">
          <span>{{ selectedCategoryName }}</span>
          <i class="fas" [class.fa-chevron-up]="isMenuOpen" [class.fa-chevron-down]="!isMenuOpen"></i>
        </button>

        <div class="category-dropdown" [class.show]="isMenuOpen">
          <div class="dropdown-item" [class.active]="selectedCategoryId === null" (click)="selectCategory('All')">All Categories</div>
          <div *ngFor="let cat of categories" class="dropdown-item"
               [class.active]="selectedCategoryId === cat.id" (click)="selectCategory(cat)">
            {{ cat.name }}
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="header-bar glass-panel">
        <div class="title-info">
          <h2>{{ selectedCategoryName }} <span>Store</span></h2>
        </div>

        <div class="search-box">
          <i class="fas fa-search search-icon"></i>
          <input type="text" [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" placeholder="Search products..." class="search-input">
          <button class="search-btn" (click)="onSearch()">Search</button>
        </div>
      </header>

      <div class="product-grid" *ngIf="!isLoading">
        <div class="product-card glass-panel" *ngFor="let p of products" (click)="viewDetail(p.id)">
          <div class="image-box">
            <img [src]="p.imageUrl || 'https://placehold.co/300x300?text=Product'">
          </div>
          <div class="product-info">
            <h4>{{ p.name }}</h4>
            <div class="price-row">
              <span class="price">{{ p.unitPrice | currency:'USD' }}</span>
              <button class="btn-add" (click)="addToCart(p, $event)"><i class="fas fa-plus"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="pagination-bar glass-panel" *ngIf="totalPages > 1">
        <button class="page-btn" [disabled]="currentPage === 0" (click)="changePage(currentPage - 1)">
          <i class="fas fa-arrow-left"></i>
        </button>
        <span class="page-info">Page <b>{{currentPage + 1}}</b> of {{totalPages}}</span>
        <button class="page-btn" [disabled]="currentPage === totalPages - 1" (click)="changePage(currentPage + 1)">
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </main>
  </div>
</div>
